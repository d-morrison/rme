project:
  type: book
  output-dir: _book

book:
  title: "Regression Models for Epidemiology"
  downloads: [pdf]
  author:
    - name: "Ezra Morrison"
      url: https://demorrison.ucdavis.edu/
      affiliation: Department of Public Health Sciences, School of Medicine, University of California, Davis
  page-footer:
    left:
      - text: "Copyright 2024, Douglas Ezra Morrison"
  date: last-modified
  date-format: "[Last modified:] YYYY-MM-DD: H:mm:ss (z)"
  google-analytics: "G-VS314RJ2KP"
  reader-mode: true
  repo-url: https://github.com/d-morrison/rme
  repo-actions: [edit, issue, source]
  chapters:
    - chapters/index.qmd
    - part: "Course Logistics"
      chapters:
       - chapters/syllabus.qmd
       - chapters/schedule.qmd
    - chapters/Intro-to-GLMs.qmd
    - part: chapters/glms.qmd
      chapters:
       - chapters/Linear-models-overview.qmd
       - chapters/binary-outcome-associations.qmd
       - chapters/logistic-regression.qmd
       - chapters/count-regression.qmd
       - chapters/causal-inference.qmd
       - chapters/predictor-selection.qmd
       - chapters/intro-multilevel-models.qmd
    - part: chapters/time-to-event-models.qmd
      chapters:
       - chapters/intro-to-survival-analysis.qmd
       - chapters/proportional-hazards-models.qmd
       - chapters/parametric-survival-models.qmd
       - chapters/midterm-2-review-session.qmd
    - chapters/top-ten-concepts.qmd
  references: chapters/references.qmd
  appendices:
    - chapters/appendices-are-prereqs.qmd
    - chapters/math-prereqs.qmd
    - chapters/data.qmd
    - chapters/exploratory-descriptive.qmd
    - chapters/probability.qmd
    - chapters/basic-statistical-methods.qmd
    - chapters/classification.qmd
    - chapters/estimation.qmd
    - chapters/nonparametric-models.qmd
    - chapters/inference.qmd
    - chapters/intro-MLEs.qmd
    - chapters/bayesian-inference.qmd
    - chapters/common-mistakes.qmd
    - chapters/notation.qmd
    - chapters/proof-writing.qmd
    - chapters/package-versions.qmd
    - chapters/intro-to-R.qmd
    - chapters/CONTRIBUTING.qmd
    - chapters/exam-formula-sheet.qmd
    - chapters/practice-exam-mle-linreg.qmd
    - chapters/concept-map.qmd
  back-to-top-navigation: true
  page-navigation: true

format:
  html:
    lightbox: true
    link-external-icon: true
    embed-resources: false # breaks pdf version
    shift-heading-level-by: 0
    subject: "Epidemiology 204"
    date: last-modified
    date-format: "[Last modified:] YYYY-MM-DD: H:mm:ss (A)"
    theme:
       light: cosmo
       dark: darkly
    code-tools: true
    df-print: paged
    code-fold: true
    code-link: true
    fig-cap-location: top
    html-math-method: mathjax
    number-sections: true
    number-depth: 3
    toc-depth: 3
    code-summary: "Show R code"
    css: custom.scss
  pdf:
    geometry:
      - top=15mm
      - bottom=20mm
    keep-md: false
    keep-tex: false
    toc: true
    fig-pos: "H"
    hyperrefoptions:
    - bookmarksnumbered=true
    toc-title: Contents
    # df-print: kable
    df-print: tibble
    links-as-notes: true
    documentclass: scrbook
    classoption: [twoside=off]
    shift-heading-level-by: 0
    toc-depth: 2
    number-sections: true
    number-depth: 3
    colorlinks: true
    include-in-header:
      text: |
        \usepackage{makeidx}
        \usepackage{needspace}
        \usepackage{etoolbox}
        \AtBeginEnvironment{longtable}{\Needspace{10\baselineskip}}
        \makeindex
    include-after-body:
      text: |
        \printindex

comments:
  hypothesis:
    theme: clean
    openSidebar: false
    enableExperimentalNewNoteButton: true

execute:
  warning: false
  message: false
  cache: false
  freeze: auto  # re-render only when source changes

editor: source

knitr:
  opts_chunk:
    collapse: true
    # df_print: paged
    comment: "#>"
    R.options:
      knitr.graphics.auto_pdf: true
