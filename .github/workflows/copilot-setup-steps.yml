# GitHub Copilot Setup Steps for rme
#
# This workflow configures the GitHub Copilot coding agent's environment
# by preinstalling R, Quarto, TinyTeX, and all required dependencies.
#
# See: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/customize-the-agent-environment
# For detailed setup instructions, see .github/copilot-instructions.md
#
# This workflow aligns with the setup requirements documented in .github/copilot-instructions.md:
# - R version >= 3.5 (as specified in DESCRIPTION, prefer latest release)
# - Quarto CLI for rendering the website
# - TinyTeX for PDF output
# - JAGS for Bayesian analysis (rjags and runjags packages)
# - All package dependencies managed via renv

name: "Copilot Setup Steps"

# The `on:` triggers below run this workflow as ordinary validation CI,
# gated to changes of THIS file so edits to it can be validated without
# paying the setup cost on every unrelated PR.
#
# `skip-cp-setup` label: the check_label step skips the heavy install
# (checkout only) ONLY on `pull_request` events that carry the label — so a
# metadata/workflow-only PR can opt out of the validation-run setup. Any
# non-`pull_request` invocation (push, workflow_dispatch) always runs full
# setup. GitHub's Copilot coding agent also runs this job directly to
# provision its environment; that invocation is NOT a documented
# `pull_request` event, so the label is NOT guaranteed to affect Copilot's
# provisioning — treat the label as a CI-validation control only.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    
    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      contents: read
      pull-requests: read   # read PR labels for the skip-cp-setup check

    # Timeout after 55 minutes (max is 59 for copilot-setup-steps)
    timeout-minutes: 55

    steps:
      # Skip the heavy install when a PR carries the `skip-cp-setup` label
      # (e.g. metadata- or workflow-only PRs). Non-PR events always run setup.
      - name: Check if setup should be skipped
        id: check_label
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABELS_CONTAIN_SKIP: ${{ contains(github.event.pull_request.labels.*.name, 'skip-cp-setup') }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" != 'pull_request' ]]; then
            echo "Not a pull request, running full setup"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          elif [[ "$LABELS_CONTAIN_SKIP" == 'true' ]]; then
            echo "skip-cp-setup label present, skipping setup steps"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip-cp-setup label not present, running full setup"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Checkout code - Copilot will do this automatically if we don't,
      # but we need it to install dependencies from renv.lock
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: false

      - name: Checkout submodules
        if: steps.check_label.outputs.skip != 'true'
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1
      
      # Install system dependencies required for R packages
      # See .github/copilot-instructions.md "System Dependencies" and "JAGS Dependencies" sections
      - name: Install system dependencies
        if: steps.check_label.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jags \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libglpk-dev \
            poppler-utils \
            tesseract-ocr \
            tesseract-ocr-eng \
            maxima \
            python3-pip

      # Install SymPy - a Python computer algebra system (CAS) for symbolic mathematics.
      # SymPy can perform symbolic differentiation, integration, simplification,
      # equation solving, and many other algebraic operations needed for this
      # statistics/mathematics textbook.
      # Maxima (installed above via apt-get) provides a complementary full-featured CAS
      # accessible from the command line.
      - name: Install SymPy (Python CAS)
        if: steps.check_label.outputs.skip != 'true'
        run: pip3 install --break-system-packages sympy
      
      # Set up pandoc for documentation
      - name: Set up Pandoc
        if: steps.check_label.outputs.skip != 'true'
        uses: r-lib/actions/setup-pandoc@v2
      
      # Set up R using the standard GitHub Actions setup
      # R version >= 3.5 required (see DESCRIPTION and .github/copilot-instructions.md)
      # Using 'release' to get the latest R version
      - name: Set up R
        if: steps.check_label.outputs.skip != 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      
      # Set up Quarto - required for rendering the website
      # See .github/copilot-instructions.md "Quarto Rendering" section
      - name: Set up Quarto
        if: steps.check_label.outputs.skip != 'true'
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Install R dependencies using renv
      # This project uses renv for package management
      # See .github/copilot-instructions.md "R Package Management" section
      - name: Install R dependencies via renv
        if: steps.check_label.outputs.skip != 'true'
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
      
      # Verify R environment is properly configured
      # See .github/copilot-instructions.md sections on development setup
      - name: Verify development environment
        if: steps.check_label.outputs.skip != 'true'
        run: |
          echo "=== R Development Environment Status ==="
          Rscript -e '
            cat("R version:", R.version.string, "\n\n")
            
            # Check R version meets minimum requirement (>= 3.5)
            r_version <- paste(R.version$major, R.version$minor, sep = ".")
            cat("Checking R version >= 3.5... ")
            if (getRversion() >= "3.5") {
              cat("PASSED (", r_version, ")\n\n", sep = "")
            } else {
              cat("FAILED (", r_version, ")\n\n", sep = "")
              stop("R version must be >= 3.5")
            }
            
            # Display key installed packages from DESCRIPTION
            cat("Key installed packages:\n")
            key_packages <- c("arm", "arsenal", "cards", "cardx", "cvTools", "dobson",
                            "forcats", "fs", "glmmTMB", "glmnet", "gtsummary", "here",
                            "insight", "knitr", "latex2exp", "olsrr", "pander", "printr",
                            "reactable", "rlang", "rmarkdown", "stringr", "table1", "tibble",
                            "webshot2", "tidyverse", "rjags", "runjags", "ggplot2", "dplyr",
                            "tidyr", "spelling", "gh", "lintr", "purrr", "pkgdown")
            for (pkg in key_packages) {
              if (requireNamespace(pkg, quietly = TRUE)) {
                cat("  -", pkg, ":", as.character(packageVersion(pkg)), "\n")
              } else {
                cat("  -", pkg, ": NOT INSTALLED\n")
              }
            }
            
            cat("\nTotal packages installed:", nrow(installed.packages()), "\n")
          '
          
          # Verify Quarto is installed and working
          echo ""
          echo "=== Quarto Status ==="
          quarto --version
          quarto list tools
          
          # Verify JAGS is installed
          echo ""
          echo "=== JAGS Status ==="
          if which jags > /dev/null 2>&1; then
            echo "JAGS found in PATH"
            jags -v 2>&1 || echo "JAGS installed but version check failed"
          else
            echo "JAGS not found in PATH"
          fi
          
          # Verify renv is active
          echo ""
          echo "=== renv Status ==="
          Rscript -e 'cat("renv active:", !is.null(renv::project()), "\n")'
          Rscript -e 'cat("renv library path:", .libPaths()[1], "\n")'
          
          # Verify SymPy (Python CAS) is installed
          echo ""
          echo "=== SymPy CAS Status ==="
          python3 -c "import sympy; from sympy import symbols, diff, solve, latex; x = symbols('x'); e = x**3 + 2*x**2 - x - 2; print('SymPy', sympy.__version__, '| diff:', diff(e, x), '| roots:', solve(e, x)); print('SymPy: OK')"

          # Verify Maxima (CAS) is installed
          echo ""
          echo "=== Maxima CAS Status ==="
          if which maxima > /dev/null 2>&1; then
            echo "diff(x^3 + 2*x^2 - x - 2, x);" | maxima --very-quiet
            echo "Maxima: OK"
          else
            echo "Maxima not found in PATH"
          fi

          echo ""
          echo "Development environment setup complete!"
