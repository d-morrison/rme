name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.SUBMODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git submodule update --init --recursive --depth 1

      # Give Claude on-demand access to the private ucdavis/epi202 repo
      # (Epi 202 course materials). With this in place, in-session calls
      # like `git clone https://github.com/ucdavis/epi202`,
      # `GH_TOKEN=$EPI202_TOKEN gh api repos/ucdavis/epi202/...`, or
      # `curl -H "Authorization: token $EPI202_TOKEN" https://api.github.com/repos/ucdavis/epi202/...`
      # all just work without Claude needing to re-supply credentials.
      # No-ops gracefully if EPI202_TOKEN is not configured.
      - name: Configure access to ucdavis/epi202
        env:
          EPI202_TOKEN: ${{ secrets.EPI202_TOKEN }}
        run: |
          if [ -z "${EPI202_TOKEN}" ]; then
            echo "::warning::EPI202_TOKEN not set; ucdavis/epi202 will not be accessible."
            exit 0
          fi
          # Scope the credential to ucdavis/epi202 specifically so unrelated
          # github.com URLs continue using the default GITHUB_TOKEN-backed auth.
          git config --global \
            "url.https://x-access-token:${EPI202_TOKEN}@github.com/ucdavis/epi202.insteadOf" \
            "https://github.com/ucdavis/epi202"
          # Surface to subsequent steps so Claude can use it for gh/curl too.
          echo "EPI202_TOKEN=${EPI202_TOKEN}" >> "$GITHUB_ENV"

      # Install system dependencies required for R packages and tools
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            jags \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libglpk-dev \
            poppler-utils \
            tesseract-ocr \
            tesseract-ocr-eng \
            maxima \
            python3-pip

      - name: Install SymPy (Python CAS)
        run: pip3 install --break-system-packages sympy

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install R dependencies via renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Capture PR head SHA before Claude
        id: head_before
        if: github.event.pull_request.number || github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          SHA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # Build a WebFetch permission list from the shared stats-allowlist repo
      # so Claude can read pages from d-morrison.github.io and other approved
      # sites referenced in the book. Trust model: anyone with push access to
      # d-morrison/stats-allowlist@main can expand Claude's WebFetch scope on
      # the next workflow run here. The hostname regex below ensures even a
      # tampered entry can only widen WebFetch coverage, not inject other
      # claude_args.
      - name: Build allowed-tools list from stats-allowlist
        id: tools
        run: |
          # Initialize to empty so a curl failure degrades gracefully to the
          # base toolset (Bash only) rather than failing the whole @claude
          # workflow with no PR feedback.
          : > /tmp/allowlist.txt
          curl -fsSL https://raw.githubusercontent.com/d-morrison/stats-allowlist/main/allowlist.txt \
            -o /tmp/allowlist.txt \
            || echo "::warning::Could not fetch stats-allowlist; running Claude without WebFetch permissions."
          # Reject anything that isn't a strictly valid hostname so a typo or
          # tampered upstream entry can't inject extra claude_args via " or
          # other shell metacharacters.
          WEBFETCH=$(tr -d '\r' < /tmp/allowlist.txt \
            | grep -v '^[[:space:]]*$' \
            | grep -v '^[[:space:]]*#' \
            | sed -E 's#^[[:space:]]*https?://##' \
            | sed -E 's#/.*$##' \
            | sed -E 's#[^A-Za-z0-9.-]+$##' \
            | tr '[:upper:]' '[:lower:]' \
            | grep -E '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)*$' \
            | sort -u \
            | sed 's#.*#WebFetch(domain:&)#' \
            | paste -sd, -)
          if [ -n "$WEBFETCH" ]; then
            echo "allowed=Bash(Rscript *),Bash(quarto *),Bash(curl *),${WEBFETCH}" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=Bash(Rscript *),Bash(quarto *),Bash(curl *)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # Allow the pre-commit checklist tools from CLAUDE.md (Rscript for
          # lint/spell-check, quarto render for chapter previews), curl for
          # downloading source PDFs too large for WebFetch (issue #740), plus
          # WebFetch for every host in the shared stats-allowlist.
          claude_args: '--allowed-tools "${{ steps.tools.outputs.allowed }}"'

      - name: Re-request review and dispatch code review if Claude pushed commits
        if: always() && (github.event.pull_request.number || github.event.issue.pull_request) && steps.head_before.outputs.sha != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA_BEFORE: ${{ steps.head_before.outputs.sha }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          SHA_AFTER=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER" --jq '.head.sha')
          echo "before=$SHA_BEFORE  after=$SHA_AFTER"
          if [ "$SHA_AFTER" != "$SHA_BEFORE" ]; then
            echo "Claude pushed new commits; re-requesting review and dispatching code review."
            gh api -X POST \
              "repos/${{ github.repository }}/pulls/$PR_NUMBER/requested_reviewers" \
              -f "reviewers[]=d-morrison" || true
            # Fire claude-code-review.yml via workflow_dispatch. The default
            # GITHUB_TOKEN is permitted to trigger workflow_dispatch (unlike
            # push, which is blocked to avoid recursion), and the review
            # workflow's own `concurrency` group will cancel any in-flight
            # review for this PR so the freshest diff wins.
            gh workflow run claude-code-review.yml -f pr_number="$PR_NUMBER" || \
              echo "::warning::Could not dispatch claude-code-review.yml; review will not auto-run."
          else
            echo "No new commits on PR head; skipping re-request and review dispatch."
          fi
