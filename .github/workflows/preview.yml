name: Quarto Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - 'man/**'
      - 'pkgdown/**'
      - 'vignettes/**'
      - '_quarto*.yml'
      - '.github/workflows/preview.yml'
      - '.github/workflows/publish.yml'
      - '*.qmd'

concurrency: preview-${{ github.ref }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - uses: r-lib/actions/setup-r@HEAD
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jags libcurl4-openssl-dev libpng-dev libfontconfig1-dev libjpeg-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Install local package
        run: |
          R CMD INSTALL .
        shell: bash

      - name: Render
        if: github.event.action != 'closed' # skip the build if the PR has been closed
        uses: quarto-dev/quarto-actions/render@v2

      - name: list files
        shell: bash
        run: |
          echo "contents of _site:\n"
          ls _site/
          echo "contents of .:\n"
          ls .
      - name: Delete old preview comments
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // Find and delete comments from pr-preview-action
            for (const comment of comments.data) {
              if (comment.user.login === 'github-actions[bot]' && 
                  comment.body.includes('preview of')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
      
      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@main
        with:
          source-dir: _site/

