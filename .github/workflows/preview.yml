name: Quarto Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - closed
    paths:
      - 'man/**'
      - 'pkgdown/**'
      - 'vignettes/**'
      - '_quarto*.yml'
      - '.github/workflows/preview.yml'
      - '.github/workflows/publish.yml'
      - '*.qmd'
      - '_subfiles/**'
      - '*.scss'

concurrency: preview-${{ github.ref }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: false

      - uses: r-lib/actions/setup-r@HEAD
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jags libcurl4-openssl-dev libpng-dev libfontconfig1-dev libjpeg-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Install local package
        run: |
          R CMD INSTALL .

      - name: Set up TinyTeX
        if: github.event.action != 'closed' && contains(github.event.pull_request.labels.*.name, 'preview:pdf')
        uses: quarto-dev/quarto-actions/setup@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - name: Install TinyTeX packages required for PDF rendering
        if: github.event.action != 'closed' && contains(github.event.pull_request.labels.*.name, 'preview:pdf')
        run: |
          Rscript -e "tinytex::tlmgr_repo('https://mirror.ctan.org/systems/texlive/tlnet')"
          Rscript -e "tinytex::tlmgr_install(c('luacolor', 'lua-ul'))"

      - name: Cache Quarto freeze
        uses: actions/cache@v5
        with:
          path: _freeze
          key: quarto-freeze-${{ runner.os }}-${{ hashFiles('renv.lock') }}-${{ github.sha }}
          restore-keys: |
            quarto-freeze-${{ runner.os }}-${{ hashFiles('renv.lock') }}-
            quarto-freeze-${{ runner.os }}-

      - name: Render requested formats
        if: github.event.action != 'closed' # skip the build if the PR has been closed
        shell: bash
        run: |
          FORMATS="html"

          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'preview:revealjs') }}" == "true" ]]; then
            FORMATS="${FORMATS},revealjs"
          fi

          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'preview:pdf') }}" == "true" ]]; then
            FORMATS="${FORMATS},pdf"
          fi

          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'preview:docx') }}" == "true" ]]; then
            FORMATS="${FORMATS},docx"
          fi

          echo "Rendering formats: ${FORMATS}"
          quarto render --profile website --to "${FORMATS}"

      - name: list files
        if: github.event.action != 'closed'
        shell: bash
        run: |
          echo "contents of _site:\n"
          ls _site/
          echo "contents of .:\n"
          ls .
      
      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        id: preview
        with:
          source-dir: _site/
          comment: false
      
      - name: Delete old preview comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: steps.preview.outputs.deployment-action == 'deploy'
        continue-on-error: true
        with:
          header: pr-preview
          delete: true
      
      - name: Comment with preview link
        uses: marocchino/sticky-pull-request-comment@v3
        if: steps.preview.outputs.deployment-action == 'deploy'
        continue-on-error: true
        with:
          header: pr-preview
          recreate: true
          message: |
            [PR Preview Action](https://github.com/rossjrw/pr-preview-action) ${{ steps.preview.outputs.action-version }}
            :---:
            :rocket: **Preview available at:** ${{ steps.preview.outputs.preview-url }}
            
            <sub>Built to branch [`gh-pages`](${{ github.server_url }}/${{ github.repository }}/tree/gh-pages) at ${{ steps.preview.outputs.action-start-time }}.</sub>
      
      - name: Remove preview comment
        uses: marocchino/sticky-pull-request-comment@v3
        if: steps.preview.outputs.deployment-action == 'remove'
        continue-on-error: true
        with:
          header: pr-preview
          message: |
            [PR Preview Action](https://github.com/rossjrw/pr-preview-action) ${{ steps.preview.outputs.action-version }}
            :---:
            Preview removed because the pull request was closed.
            
            <sub>${{ steps.preview.outputs.action-start-time }}</sub>
