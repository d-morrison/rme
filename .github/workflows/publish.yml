on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: list files
        shell: bash
        run: |
          ls

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - uses: r-lib/actions/setup-r@HEAD
        with:
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jags libcurl4-openssl-dev libpng-dev libfontconfig1-dev libjpeg-dev libglpk-dev

      - uses: r-lib/actions/setup-renv@v2

      - name: Install local package
        run: |
          R CMD INSTALL .
        shell: bash

      - name: Cache Quarto freeze
        uses: actions/cache@v5
        with:
          path: _freeze
          key: quarto-freeze-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: |
            quarto-freeze-${{ runner.os }}-

      - name: Render
        uses: quarto-dev/quarto-actions/render@HEAD

      - name: Deploy to gh-pages (preserving PR previews)
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          folder: _site
          clean-exclude: pr-preview/
