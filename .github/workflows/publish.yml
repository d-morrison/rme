on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: list files
        shell: bash
        run: |
          ls

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tinytex: true

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.0'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jags libcurl4-openssl-dev libpng-dev libfontconfig1-dev libjpeg-dev libglpk-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libtiff5-dev libwebp-dev libnode109

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - uses: r-lib/actions/setup-renv@v2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        with:
          bypass-cache: never

      - name: Install local package
        run: |
          R CMD INSTALL .
        shell: bash

      - name: Render
        uses: quarto-dev/quarto-actions/render@v2
        env:
          # Quarto's launcher caps Deno at an 8 GB V8 heap by default and
          # appends this env var's flags after its own, so the later
          # duplicate wins (V8 parses flags last-wins). The full site render
          # now exceeds 8 GB of cumulative heap and crashes with
          # "Fatal JavaScript out of memory" (exit 133) without this;
          # 12 GB of the runner's 16 GB leaves headroom for R and the OS.
          # Same fix as gha#263 applies to the PR preview builds; this
          # bespoke workflow needs it set directly (rme#1044).
          QUARTO_DENO_V8_OPTIONS: --max-old-space-size=12288,--max-heap-size=12288

      - name: Save Quarto freeze
        if: github.ref_name == 'main'
        uses: actions/cache/save@v6
        with:
          path: _freeze
          key: quarto-freezer-${{ runner.os }}-${{ hashFiles('renv.lock') }}-main-${{ github.sha }}

      - name: Deploy to gh-pages (preserving PR previews)
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          folder: _site
          clean-exclude: pr-preview/
