# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  pull_request:

name: lint-changed-files.yaml

permissions: read-all

jobs:
  lint-changed-files:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # renv::restore() only needs each package's already-pinned RemoteSha from
      # renv.lock; it doesn't need to also re-resolve DESCRIPTION's Remotes:
      # field against GitHub's API (a source of flaky/rate-limited failures --
      # see d-morrison/rme#994). Disabling this consistency check removes that
      # extra network dependency without changing which package versions get
      # installed.
      RENV_CONFIG_INSTALL_REMOTES: false
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.6.0'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jags libcurl4-openssl-dev libpng-dev libfontconfig1-dev libjpeg-dev libglpk-dev libharfbuzz-dev libfribidi-dev libfreetype6-dev libtiff5-dev libwebp-dev libnode109

      - uses: r-lib/actions/setup-renv@v2
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Add lintr options
        run: |
          cat('\noptions(lintr.linter_file = ".lintr")\n', file = "~/.Rprofile", append = TRUE)
        shell: Rscript {0}

      - name: Extract and lint files changed by this PR
        run: |
          files <- gh::gh(
            "GET https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files",
            .limit = Inf
          )
          changed_files <- files |>
            purrr::keep(~ .$status != "renamed" || .$changes > 0) |>
            purrr::map_chr("filename")
          changed_files <- setdiff(changed_files, "renv/activate.R")
          if (length(changed_files) == 0) {
            message("No changed files to lint.")
          } else {
            all_files <- list.files(recursive = TRUE)
            exclusions_list <- as.list(setdiff(all_files, changed_files))
            lintr::lint_dir(exclusions = exclusions_list)
          }
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
