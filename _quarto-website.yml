callouty-theorem:
  thm:
    override-title: false # do not have the filter set
                          # or override a callout title
    callout: # parameters of the wrapping callout
             # see Quarto callout docs for details
      type: lem  # same color as lem (royal blue); color set in custom-callout block below
      appearance: minimal
  lem:
    override-title: false
    callout:
      type: lem
      appearance: minimal
  cor:
    override-title: false
    callout:
      type: cor
      appearance: minimal
  prp:
    override-title: false
    callout:
      type: prp
      appearance: minimal
  cnj:
    override-title: false
    callout:
      type: cnj
      appearance: minimal
  def:
    override-title: false
    callout:
      type: def
      appearance: minimal
  exm:
    override-title: false
    callout:
      type: exm
      appearance: default
      collapse: false
      icon: false
  exr:
    override-title: false
    callout:
      type: exr
      appearance: minimal
  proof: # also support wrapping proof-like environments
    override-title: true # override the callout title with
                         # the proof-type label,
                         # appending the element name when provided
    callout:
      type: proof
      appearance: default
      collapse: true
      icon: true
  solution:
    override-title: true
    callout:
      type: solution
      appearance: default
      collapse: true
      icon: false
  remark:
    override-title: true
    callout:
      type: remark
      appearance: default
      collapse: false
      icon: true

# Color palette for theorem/proof environments.
# The coatless-quarto/custom-callout extension reads this block and injects
# CSS (HTML) and LaTeX \definecolor (PDF) so each type gets a unique color.
# Rules: no reds; thm shares lem's royal blue.
custom-callout:
  lem:
    color: "#1565C0"  # royal blue (also used for thm)
  cor:
    color: "#00838F"  # dark cyan
  prp:
    color: "#827717"  # dark olive
  cnj:
    color: "#558B2F"  # grass green
  def:
    color: "#1B5E20"  # forest green (very distinct from theorem types)
  exm:
    color: "#6A1B9A"  # deep purple
  exr:
    color: "#FFA500"  # orange
  proof:
    color: "#37474F"  # blue-grey slate
  solution:
    color: "#4E342E"  # dark cocoa
  remark:
    color: "#AD1457"  # dark magenta

format:
  html:
    filters:
      - callouty-theorem
      - coatless-quarto/custom-callout
    theme:
      light: [cosmo, custom.scss]
      dark: [darkly, custom.scss]
    toc: true
    toc-location: right
    toc-depth: 3
    # Clone the within-chapter TOC into a collapsible menu on mobile, where
    # Quarto hides the right-margin TOC (see _mobile-toc.html / custom.scss).
    include-after-body:
      - _mobile-toc.html
    code-fold: true
    code-tools: true
    code-link: true
    code-summary: "Show R code"
    highlight-style: arrow
    lightbox: true
    link-external-icon: true
    embed-resources: false
    fig-cap-location: top
    html-math-method: mathjax
    number-sections: true
    number-depth: 3
    df-print: paged
    date: last-modified
    date-format: "[Last modified:] YYYY-MM-DD: H:mm:ss (z)"
    subject: "Epidemiology 204"
  revealjs:
    filters:
      - filters/revealjs-slidebreak-after-h1.lua
      - d-morrison/revealjs-html-links
    search: false
    lightbox: true
    theme: dark
    embed-resources: false
    fig-cap-location: top
    html-math-method: mathjax
    smaller: true
    number-sections: true
    progress: true
    incremental: false
    df-print: paged
    number-depth: 2
    slide-number: true
    shift-heading-level-by: 0
    slide-level: 2
    scrollable: true
    echo: true
    margin: 0.0
    code-fold: true
    code-link: true
    code-summary: "[R code]"
    auto-stretch: true
    fig-height: 5
    fig-width: 7
  pdf:
    filters:
      - callouty-theorem
      - coatless-quarto/custom-callout
    geometry:
      - top=15mm
      - bottom=20mm
    keep-md: false
    keep-tex: false
    toc: true
    fig-pos: "H"
    toc-title: Contents
    df-print: tibble
    links-as-notes: true
    documentclass: article
    colorlinks: true
    number-sections: true
    number-depth: 3
    include-in-header:
      text: |
        \newcounter{chapter}
        \renewcommand{\thechapter}{\arabic{section}}
        \usepackage{needspace}
        \usepackage{etoolbox}
        \AtBeginEnvironment{longtable}{\Needspace{10\baselineskip}}
        \makeatletter
        \AtBeginDocument{%
          \let\quarto@cl@chapter\cl@chapter
          \appto\cl@section{\quarto@cl@chapter}}
        \makeatother
  docx:
    filters:
      - callouty-theorem
      - coatless-quarto/custom-callout
    toc: true
    toc-depth: 3
    number-sections: true
    number-depth: 3
    df-print: tibble
    prefer-html: true
crossref:
  chapters: false
comments:
  hypothesis:
    theme: clean
    openSidebar: false
    enableExperimentalNewNoteButton: true
